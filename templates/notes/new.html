{% extends "base.html" %}
{% block title %}Upload Notes PDF — Mining Study Hub{% endblock %}
{% block content %}
<div class="narrow section">
  <div class="form-card">
    <h2>Upload Notes PDF</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required placeholder="e.g. Roof Bolting Notes">
      </div>
      <div class="field">
        <label for="subject_id">Subject</label>
        <select id="subject_id" name="subject_id">
          <option value="">Uncategorised</option>
          {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="semester">Semester</label>
        <input type="number" id="semester" name="semester" min="1" max="8" placeholder="e.g. 4">
      </div>
      <div class="field">
        <label for="file">PDF file</label>
        <input type="file" id="file" name="file" accept="application/pdf" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Upload PDF</button>
    </form>
  </div>
</div>
{% endblock %}
