{% extends "base.html" %}
{% block title %}Write a Note — Mining Study Hub{% endblock %}
{% block content %}
<div class="narrow section">
  <div class="form-card">
    <h2>Write a note</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required placeholder="e.g. Roof Bolting">
      </div>
      <div class="field">
        <label for="subject_id">Subject</label>
        <select id="subject_id" name="subject_id">
          <option value="">Uncategorised</option>
          {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="content">Content</label>
        <textarea id="content" name="content" required placeholder="Write your note here..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Publish note</button>
    </form>
  </div>
</div>
{% endblock %}
