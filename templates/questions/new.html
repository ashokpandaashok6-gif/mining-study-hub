{% extends "base.html" %}
{% block title %}Add Question — Mining Study Hub{% endblock %}
{% block content %}
<div class="narrow section">
  <div class="form-card">
    <h2>Add a question</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="question">Question</label>
        <textarea id="question" name="question" required placeholder="e.g. Explain Roof Bolting."></textarea>
      </div>
      <div class="field">
        <label for="answer">Answer (optional)</label>
        <textarea id="answer" name="answer" placeholder="Model answer..."></textarea>
      </div>
      <div class="field">
        <label for="subject_id">Subject</label>
        <select id="subject_id" name="subject_id">
          <option value="">Uncategorised</option>
          {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="marks">Marks</label>
        <input type="number" id="marks" name="marks" min="1" max="20">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Add question</button>
    </form>
  </div>
</div>
{% endblock %}
