{% extends "base.html" %}
{% block title %}Register — Mining Study Hub{% endblock %}
{% block content %}
<div class="narrow section">
  <div class="form-card">
    <h2>Create your account</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6">
        <div class="form-hint">At least 6 characters.</div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    <p class="form-hint" style="margin-top:16px;">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
  </div>
</div>
{% endblock %}
