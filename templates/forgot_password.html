{% extends "base.html" %}
{% block title %}Forgot Password — Mining Study Hub{% endblock %}
{% block content %}
<div class="narrow section">
  <div class="form-card">
    <h2>Forgot Password</h2>
    <p class="form-hint">Enter your email address and we will send a 6-digit code to reset your password.</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send reset code</button>
    </form>
    <p class="form-hint" style="margin-top:16px;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
  </div>
</div>
{% endblock %}
