{% extends "base.html" %}
{% block title %}Reset Password — Mining Study Hub{% endblock %}
{% block content %}
<div class="narrow section">
  <div class="form-card">
    <h2>Reset Password</h2>
    <p class="form-hint">Enter the 6-digit code sent to your email and choose a new password.</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" value="{{ email }}" required>
      </div>
      <div class="field">
        <label for="code">6-digit code</label>
        <input type="text" id="code" name="code" maxlength="6" required autofocus>
      </div>
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="field">
        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" name="confirm" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset password</button>
    </form>
    <p class="form-hint" style="margin-top:16px;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
  </div>
</div>
{% endblock %}
